<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0; stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#555; stop-opacity:1"></stop>
    </linearGradient>

    <linearGradient id="grad2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f0f0; stop-opacity:1"></stop>
      <stop offset="100%" style="stop-color:#444; stop-opacity:1"></stop>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="256" cy="256" r="250" fill="black"></circle>

  <!-- Left vertical of N -->
  <rect x="170" y="160" width="30" height="200" fill="#e6e6e6"></rect>

  <!-- Diagonal of N -->
  <polygon points="200,160 230,160 360,360 330,360" fill="url(#grad1)"></polygon>

  <!-- Right vertical bar -->
  <rect x="320" y="150" width="35" height="130" fill="url(#grad2)"></rect>

</svg>